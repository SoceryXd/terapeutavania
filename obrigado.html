<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Mensagem enviada com sucesso para Vânia Brito." />
  <title>Mensagem enviada | Vânia Brito</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #f7f1ea;
      --soft: #efe2d6;
      --text: #3b2f2f;
      --muted: #7b6b63;
      --primary: #9a735b;
      --primary-dark: #6f4f3e;
      --white: #ffffff;
      --shadow: 0 20px 50px rgba(62, 44, 35, 0.14);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(154, 115, 91, 0.20), transparent 32%),
        linear-gradient(135deg, var(--bg), var(--soft));
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 760px;
      background: rgba(255, 255, 255, 0.82);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(255, 255, 255, 0.75);
      border-radius: 34px;
      box-shadow: var(--shadow);
      padding: 56px 42px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      width: 210px;
      height: 210px;
      border-radius: 50%;
      background: rgba(154, 115, 91, 0.12);
      top: -90px;
      right: -70px;
    }

    .brand {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.1rem;
      font-weight: 700;
      color: var(--primary-dark);
      margin-bottom: 22px;
      position: relative;
      z-index: 1;
    }

    .icon {
      width: 74px;
      height: 74px;
      border-radius: 50%;
      background: var(--primary);
      color: var(--white);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 2.2rem;
      margin-bottom: 26px;
      position: relative;
      z-index: 1;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.4rem, 6vw, 4.1rem);
      line-height: 1;
      color: var(--primary-dark);
      margin-bottom: 18px;
      position: relative;
      z-index: 1;
    }

    p {
      max-width: 560px;
      margin: 0 auto 28px;
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.7;
      position: relative;
      z-index: 1;
    }

    .actions {
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
      position: relative;
      z-index: 1;
    }

    a {
      text-decoration: none;
      font-weight: 700;
      border-radius: 999px;
      padding: 14px 24px;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    a:hover {
      transform: translateY(-2px);
    }

    .primary {
      background: var(--primary);
      color: var(--white);
      box-shadow: 0 12px 28px rgba(154, 115, 91, 0.26);
    }

    .secondary {
      background: rgba(154, 115, 91, 0.12);
      color: var(--primary-dark);
    }

    .footer {
      margin-top: 34px;
      font-size: 0.88rem;
      color: var(--muted);
      position: relative;
      z-index: 1;
    }

    @media (max-width: 560px) {
      .card {
        padding: 42px 24px;
        border-radius: 26px;
      }

      .actions a {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="brand">Vânia Brito</div>
    <div class="icon">✓</div>

    <h1>Mensagem enviada com sucesso!</h1>

    <p>
      Obrigada pelo contato. Sua mensagem foi recebida e em breve retornaremos
      para tirar suas dúvidas ou orientar sobre o atendimento.
    </p>

    <div class="actions">
      <a class="primary" href="index.html">Voltar ao site</a>
      <a class="secondary" href="https://wa.me/5511955916420?text=Olá,%20Vânia!%20Enviei%20uma%20mensagem%20pelo%20site%20e%20gostaria%20de%20falar%20sobre%20o%20atendimento." target="_blank" rel="noopener">Chamar no WhatsApp</a>
    </div>

    <div class="footer">
      Terapeuta familiar e de casais • CRTP 6642
    </div>
  </main>
</body>
</html>
